<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reston Pool Schedule Finder (2026)</title>
    <style>
        :root {
            --primary: #005a9c;
            --secondary: #00843d;
            --dark: #333;
            --light: #f4f7f6;
            --open: #e2f0d9;
            --closed: #fce4d6;
            --fitness: #fff2cc;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.6;
            color: var(--dark);
            background-color: var(--light);
            margin: 0;
            padding: 15px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #fff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        h1 {
            color: var(--primary);
            font-size: 22px;
            margin-top: 0;
            text-align: center;
            border-bottom: 2px solid var(--light);
            padding-bottom: 10px;
        }
        .controls {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 20px;
            background: var(--light);
            padding: 15px;
            border-radius: 8px;
        }
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        label {
            font-weight: bold;
            font-size: 14px;
        }
        input[type="date"] {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 16px;
            width: 100%;
            box-sizing: border-box;
        }
        .toggle-group {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
        }
        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
        .info-banner {
            font-size: 14px;
            color: #666;
            margin-bottom: 15px;
            text-align: center;
            font-weight: 500;
        }
        .pool-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .pool-card {
            padding: 15px;
            border-radius: 8px;
            border-left: 5px solid #ccc;
            display: flex;
            justify-content: space-between;
            align-items: center;
            text-decoration: none;
            color: inherit;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            cursor: pointer;
        }
        .pool-card:hover, .pool-card:active {
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .pool-card.status-open {
            background-color: var(--open);
            border-left-color: var(--secondary);
        }
        .pool-card.status-closed {
            background-color: var(--closed);
            border-left-color: #c00000;
        }
        .pool-card.status-fitness {
            background-color: var(--fitness);
            border-left-color: #ffc000;
        }
        .pool-name {
            font-weight: bold;
            font-size: 15px;
        }
        .pool-hours {
            font-size: 14px;
            text-align: right;
            max-width: 55%;
        }
        .map-icon {
            font-size: 12px;
            color: var(--primary);
            display: block;
            margin-top: 4px;
        }
    </style>
</head>
<body>

            <label for="dateSelect">Select a Date:</label>

        </div>
        <label class="toggle-group">
            <input type="checkbox" id="openOnlyToggle">
            Show only open pools

    </div>

    <div id="infoBanner" class="info-banner"></div>
    <div id="poolList" class="pool-list"></div>
</div>

                "Ridge Heights Heated Pool": { Sat: "12-6 p.m.", Sun: "12-6 p.m.", Mon: "5-7 p.m.", Tue: "5-7 p.m.", Wed: "5-7 p.m.", Thu: "5-7 p.m.", Fri: "5-7 p.m." }
            }

    };

    const weekdays = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];
    const dateInput = document.getElementById('dateSelect');
    const openOnlyToggle = document.getElementById('openOnlyToggle');
    const infoBanner = document.getElementById('infoBanner');
    const poolList = document.getElementById('poolList');

    // Set default date picker to today
    const today = new Date();
    const yyyy = today.getFullYear();
    const mm = String(today.getMonth() + 1).padStart(2, '0');
    const dd = String(today.getDate()).padStart(2, '0');
    dateInput.value = `${yyyy}-${mm}-${dd}`;

    function updatePoolStatus() {
        const selectedDateStr = dateInput.value;
        const showOpenOnly = openOnlyToggle.checked;
        if (!selectedDateStr) return;

        // Parse date properly to handle timezone issues correctly
        const selectedDate = new Date(selectedDateStr + "T00:00:00"); 
        const dayOfWeek = weekdays[selectedDate.getDay()];
        
        let activeSeason = null;
        for (let season of poolData.seasons) {
            if (selectedDateStr >= season.start && selectedDateStr <= season.end) {
                activeSeason = season.name;
                break;
            }
        }

        poolList.innerHTML = "";

        if (!activeSeason) {
            infoBanner.textContent = "No pools scheduled open for this date.";
            return;
        }

        infoBanner.textContent = `${activeSeason} • ${selectedDate.toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' })}`;

        const currentSeasonSchedule = poolData.schedules[activeSeason];
        let visiblePoolsCount = 0;

        for (let [poolName, hoursObj] of Object.entries(currentSeasonSchedule)) {
            const hours = hoursObj[dayOfWeek] || "CLOSED";
            const isClosed = hours.toUpperCase() === "CLOSED";
            
            // Filtering logic
            if (showOpenOnly && isClosed) {
                continue; 
            }

            visiblePoolsCount++;

            let statusClass = "status-open";
            if (isClosed) {
                statusClass = "status-closed";
            } else if (hours.toUpperCase().includes("FITNESS ONLY") || hours.startsWith("Fitness")) {
                statusClass = "status-fitness";
            }

            // Create an anchor tag instead of a div so it acts as a link
            const card = document.createElement('a');
            
            // Generate the Google Maps Directions URL
            // Appending " Reston, VA" to make sure Maps searches the right area
            const mapsQuery = encodeURIComponent(`${poolName}, Reston, VA`);
            card.href = `https://www.google.com/maps/dir/?api=1&destination=${mapsQuery}`;
            card.target = "_blank"; // Opens in a new tab or the Maps app
            
            card.className = `pool-card ${statusClass}`;
            
            const displayHours = hours.replace(/\n/g, '<br>');

            card.innerHTML = `
                <div>
                    <div class="pool-name">${poolName}</div>
                    <span class="map-icon">📍 Tap for directions</span>
                </div>
                <div class="pool-hours">${displayHours}</div>
            `;
            poolList.appendChild(card);
        }

        if (visiblePoolsCount === 0 && showOpenOnly) {
            poolList.innerHTML = "<div style='text-align:center; padding: 20px; color: #666;'>There are no pools open on this date.</div>";
        }
    }

    // Attach listeners
    dateInput.addEventListener('change', updatePoolStatus);
    openOnlyToggle.addEventListener('change', updatePoolStatus);
    
    // Initialize
    updatePoolStatus();
</script>

</html>
